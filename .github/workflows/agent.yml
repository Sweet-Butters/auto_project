name: framework CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -e .
      - name: Import smoke test
        run: |
          python -c "from auto_project import llm, state, notify; print('framework imports OK')"
      - name: Mock-LLM end-to-end
        env:
          MOCK_LLM: '1'
        run: |
          mkdir -p _selftest/agents
          cat > _selftest/agents/ping.py <<'PY'
          from auto_project import llm, state
          def run():
              r = llm.call("ping")
              state.set("ping", "last", r)
              print("ping ok:", r)
          PY
          cd _selftest && python -m auto_project run ping
          test -f state/ping/last.json && echo "state ok"
